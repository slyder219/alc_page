<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
	<title>A Leading Concept</title>
	<meta name="description" content="A Leading Concept" />
	<meta name="theme-color" content="#0d131d" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="apple-mobile-web-app-title" content="A Leading Concept" />
	<meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
	<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png" />
	<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png" />
	<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png" />
	<link rel="icon" href="favicon_io/favicon.ico" />
	<link rel="manifest" href="favicon_io/site.webmanifest" />
	<style>
		:root {
			--ink: #f5f7fb;
			--muted: #d5dce8;
			--glass: rgba(15, 22, 33, 0.5);
			--glass-border: rgba(255, 255, 255, 0.22);
			--shadow: 0 22px 48px rgba(3, 8, 14, 0.38);
			--accent: #f0bf76;
			--accent-soft: rgba(240, 191, 118, 0.28);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html,
		body {
			width: 100%;
			min-height: 100%;
			scroll-behavior: smooth;
			-webkit-text-size-adjust: 100%;
		}

		body {
			color: var(--ink);
			font-family: "Outfit", "Segoe UI", sans-serif;
			background: #0d131d;
			overflow-x: hidden;
		}

		.page {
			position: relative;
			min-height: 100vh;
			min-height: 100svh;
			min-height: 100dvh;
			isolation: isolate;
		}

		.background-wrap {
			position: fixed;
			top: calc(env(safe-area-inset-top) * -1);
			left: calc(env(safe-area-inset-left) * -1);
			width: calc(100vw + env(safe-area-inset-left) + env(safe-area-inset-right));
			height: calc(100vh + env(safe-area-inset-top) + env(safe-area-inset-bottom));
			height: calc(100lvh + env(safe-area-inset-top) + env(safe-area-inset-bottom));
			z-index: -2;
			overflow: hidden;
			transform: translateZ(0);
		}

		.background {
			position: absolute;
			inset: -4%;
			background-image: url("air_cargo.jpg");
			background-size: cover;
			background-position: center;
			filter: blur(9px) saturate(1.1) brightness(0.68);
			transform: scale(1.08);
			will-change: transform;
		}

		.aura {
			position: absolute;
			border-radius: 999px;
			filter: blur(44px);
			pointer-events: none;
		}

		.aura-one {
			width: min(44vw, 480px);
			height: min(44vw, 480px);
			left: -9%;
			top: 8%;
			background: rgba(231, 172, 93, 0.28);
		}

		.aura-two {
			width: min(32vw, 360px);
			height: min(32vw, 360px);
			right: -6%;
			bottom: 10%;
			background: rgba(117, 161, 210, 0.2);
		}

		.overlay {
			position: absolute;
			inset: 0;
			background:
				radial-gradient(120% 95% at 15% 10%, rgba(250, 192, 118, 0.22), transparent 62%),
				linear-gradient(130deg, rgba(7, 12, 22, 0.72) 15%, rgba(8, 14, 24, 0.45) 52%, rgba(6, 11, 20, 0.76) 100%);
			z-index: -1;
		}

		.topbar {
			position: fixed;
			top: 1rem;
			left: 50%;
			transform: translateX(-50%);
			width: min(900px, calc(100vw - 1.8rem));
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0.72rem 0.95rem;
			background: rgba(10, 15, 23, 0.46);
			border: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 999px;
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			box-shadow: 0 16px 36px rgba(2, 6, 12, 0.33);
			z-index: 10;
			transition: background 220ms ease, transform 250ms ease;
		}

		.topbar.scrolled {
			background: rgba(8, 13, 20, 0.62);
		}

		.brand {
			display: inline-flex;
			align-items: center;
			gap: 0.52rem;
			font-size: 0.78rem;
			font-weight: 600;
			letter-spacing: 0.16em;
			text-transform: uppercase;
			color: var(--ink);
			white-space: nowrap;
		}

		.brand-icon-wrap {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 1.4rem;
			height: 1.4rem;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.08);
			border: 1px solid rgba(255, 255, 255, 0.26);
			box-shadow: 0 0 0 2px rgba(240, 191, 118, 0.18);
		}

		.brand-icon {
			width: 0.92rem;
			height: 0.92rem;
			display: block;
			border-radius: 4px;
		}

		.brand-label {
			line-height: 1;
		}

		.top-contact {
			text-decoration: none;
			color: var(--ink);
			font-size: 0.74rem;
			font-weight: 500;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			padding: 0.52rem 0.9rem;
			border-radius: 999px;
			border: 1px solid rgba(255, 255, 255, 0.24);
			background: rgba(255, 255, 255, 0.06);
			transition: border-color 220ms ease, color 220ms ease;
		}

		.top-contact:hover {
			border-color: rgba(240, 191, 118, 0.9);
			color: var(--accent);
		}

		main {
			min-height: 200vh;
		}

		.hero {
			min-height: 100vh;
			min-height: 100svh;
			min-height: 100dvh;
			display: grid;
			place-items: center;
			padding: 2rem;
			padding-top: 6.2rem;
		}

		.hero-card {
			width: min(720px, 92vw);
			padding: clamp(1.8rem, 3.4vw, 2.8rem);
			border-radius: 26px;
			background: var(--glass);
			backdrop-filter: blur(14px);
			-webkit-backdrop-filter: blur(14px);
			border: 1px solid var(--glass-border);
			box-shadow: var(--shadow);
			transform: translateY(18px);
			opacity: 0;
			transition: transform 700ms ease, opacity 700ms ease;
			text-align: center;
			position: relative;
			overflow: hidden;
		}

		.hero-card::after {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(140deg, rgba(240, 191, 118, 0.12), transparent 46%);
			pointer-events: none;
		}

		.hero-mark {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 2.2rem;
			height: 2.2rem;
			border-radius: 999px;
			margin: 0 auto 0.85rem;
			background: rgba(255, 255, 255, 0.06);
			border: 1px solid rgba(255, 255, 255, 0.24);
			box-shadow: 0 0 0 6px rgba(240, 191, 118, 0.11);
			animation: halo 3.1s ease-in-out infinite;
		}

		.hero-mark img {
			width: 1.2rem;
			height: 1.2rem;
			display: block;
			border-radius: 5px;
		}

		.hero-card.show {
			transform: translateY(0);
			opacity: 1;
		}

		h1 {
			font-size: clamp(2.2rem, 7vw, 5rem);
			letter-spacing: 0.08em;
			text-transform: uppercase;
			line-height: 0.9;
			text-wrap: balance;
			text-shadow: 0 8px 28px rgba(0, 0, 0, 0.42);
		}

		.sub {
			margin-top: 1rem;
			color: var(--muted);
			font-size: clamp(0.94rem, 2.3vw, 1.1rem);
			letter-spacing: 0.14em;
			text-transform: uppercase;
		}

		.contact-section {
			min-height: 100vh;
			min-height: 100svh;
			min-height: 100dvh;
			display: grid;
			place-items: center;
			padding: 2rem;
		}

		.contact {
			padding: 1.25rem 1.6rem;
			border-radius: 999px;
			border: 1px solid rgba(255, 255, 255, 0.34);
			background: rgba(15, 21, 32, 0.4);
			backdrop-filter: blur(8px);
			-webkit-backdrop-filter: blur(8px);
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
			transform: translateY(14px) scale(0.98);
			opacity: 0;
			transition: transform 650ms ease, opacity 650ms ease, border-color 250ms ease, background 250ms ease;
		}

		.contact.show {
			transform: translateY(0) scale(1);
			opacity: 1;
		}

		.contact:hover {
			border-color: rgba(240, 191, 118, 0.9);
			background: rgba(17, 25, 37, 0.56);
		}

		.contact a {
			text-decoration: none;
			color: var(--ink);
			font-weight: 500;
			letter-spacing: 0.06em;
			font-size: clamp(0.9rem, 2.1vw, 1.02rem);
			transition: color 250ms ease;
		}

		.contact a:hover {
			color: var(--accent);
		}

		.scroll-cue {
			position: absolute;
			left: 50%;
			bottom: 1.2rem;
			transform: translateX(-50%);
			color: rgba(255, 255, 255, 0.75);
			font-size: 0.72rem;
			letter-spacing: 0.24em;
			text-transform: uppercase;
			display: flex;
			align-items: center;
			gap: 0.55rem;
			animation: rise 1.6s ease-in-out infinite;
			user-select: none;
		}

		.scroll-line {
			width: 32px;
			height: 1px;
			background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
		}

		@keyframes rise {
			0%,
			100% {
				transform: translateX(-50%) translateY(0);
			}
			50% {
				transform: translateX(-50%) translateY(-7px);
			}
		}

		@keyframes halo {
			0%,
			100% {
				box-shadow: 0 0 0 6px rgba(240, 191, 118, 0.11);
			}
			50% {
				box-shadow: 0 0 0 10px rgba(240, 191, 118, 0.06);
			}
		}

		@media (max-width: 700px) {
			html,
			body {
				overscroll-behavior-y: none;
			}

			.topbar {
				top: max(0.7rem, env(safe-area-inset-top));
				left: max(0.7rem, env(safe-area-inset-left));
				right: max(0.7rem, env(safe-area-inset-right));
				width: auto;
				transform: none;
				padding: 0.62rem 0.7rem;
			}

			.brand {
				font-size: 0.68rem;
				letter-spacing: 0.12em;
			}

			.brand-icon-wrap {
				width: 1.25rem;
				height: 1.25rem;
			}

			.brand-icon {
				width: 0.82rem;
				height: 0.82rem;
			}

			.top-contact {
				font-size: 0.65rem;
				padding: 0.45rem 0.7rem;
			}

			.hero-card {
				width: min(720px, calc(100vw - max(1rem, env(safe-area-inset-left)) - max(1rem, env(safe-area-inset-right))));
				border-radius: 18px;
			}

			.hero-mark {
				margin-bottom: 0.7rem;
			}

			.contact {
				max-width: calc(100vw - max(1rem, env(safe-area-inset-left)) - max(1rem, env(safe-area-inset-right)));
				border-radius: 16px;
			}

			.scroll-cue {
				bottom: max(0.8rem, env(safe-area-inset-bottom));
			}

			.hero,
			.contact-section {
				padding-left: max(1rem, env(safe-area-inset-left));
				padding-right: max(1rem, env(safe-area-inset-right));
			}
		}

		@media (prefers-reduced-motion: reduce) {
			html {
				scroll-behavior: auto;
			}

			.hero-card,
			.contact,
			.scroll-cue {
				animation: none;
				transition: none;
			}

			.hero-mark {
				animation: none;
			}

			.background {
				transform: scale(1.08);
			}
		}
	</style>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
	<div class="page">
		<div class="background-wrap" aria-hidden="true">
			<div class="background" id="bg"></div>
			<div class="aura aura-one"></div>
			<div class="aura aura-two"></div>
			<div class="overlay"></div>
		</div>

		<header class="topbar" id="topbar">
			<div class="brand">
				<span class="brand-icon-wrap">
					<img class="brand-icon" src="favicon_io/favicon-32x32.png" alt="" aria-hidden="true" />
				</span>
				<span class="brand-label">A Leading Concept</span>
			</div>
			<a class="top-contact" href="#contact">Contact</a>
		</header>

		<main>
			<section class="hero">
				<div class="hero-card reveal" id="hero-card">
					<div class="hero-mark" aria-hidden="true">
						<img src="favicon_io/favicon-32x32.png" alt="" />
					</div>
					<h1>A Leading Concept</h1>
					<p class="sub">In Development</p>
				</div>
				<div class="scroll-cue"><span class="scroll-line"></span>Scroll<span class="scroll-line"></span></div>
			</section>

			<section class="contact-section" id="contact">
				<div class="contact reveal">
					<a href="mailto:hello@2aleadingconcept.com">hello@2aleadingconcept.com</a>
				</div>
			</section>
		</main>
	</div>

	<script>
		const revealItems = document.querySelectorAll('.reveal');
		const background = document.getElementById('bg');
		const topbar = document.getElementById('topbar');

		const io = new IntersectionObserver(
			(entries) => {
				entries.forEach((entry) => {
					if (entry.isIntersecting) {
						entry.target.classList.add('show');
					}
				});
			},
			{ threshold: 0.25 }
		);

		revealItems.forEach((item) => io.observe(item));

		let ticking = false;
		const onScroll = () => {
			if (!ticking) {
				window.requestAnimationFrame(() => {
					const y = window.scrollY;
					const depth = Math.min(y * 0.04, 32);
					const drift = Math.min(y * 0.008, 8);
					background.style.transform = `scale(1.08) translateY(${depth}px) translateX(${drift}px)`;
					topbar.classList.toggle('scrolled', y > 28);
					ticking = false;
				});
				ticking = true;
			}
		};

		window.addEventListener('scroll', onScroll, { passive: true });
	</script>
</body>
</html>
